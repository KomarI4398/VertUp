name: govnolda
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0' # Обновили для лучшей совместимости с новыми пакетами

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.3.5
  firebase_core: ^3.10.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.5.0
  url_launcher: ^6.3.2
  image_picker: ^1.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

# Этот блок должен быть СЛЕВА, без отступов!
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21 # Добавили эту строчку, она лечит ошибку RangeError
  adaptive_icon_background: "#121212"
  adaptive_icon_foreground: "assets/icon/app_icon.png"